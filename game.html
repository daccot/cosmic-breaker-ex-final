<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosmic Breaker EX</title>
<style>
:root{--text:#eef8ff;--muted:#9fc0d4;--line:rgba(113,236,255,.22);--panel:rgba(6,16,30,.66);--panel2:rgba(12,24,46,.72);--accent:rgba(140,230,255,.26)}
*{box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{margin:0;padding:0;overflow:hidden;background:#020816;color:var(--text);font-family:Arial,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
#bg{position:fixed;inset:0;background:radial-gradient(circle at 8% 0%, rgba(0,180,255,.16), transparent 26%),radial-gradient(circle at 92% 0%, rgba(255,0,170,.10), transparent 26%),linear-gradient(180deg,#05111f,#030816 56%,#100720)}
#gameCanvas{position:fixed;inset:0;z-index:1}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));box-shadow:0 10px 30px rgba(0,0,0,.3), inset 0 0 26px rgba(113,236,255,.05)}
#hud{position:fixed;left:12px;right:12px;top:12px;z-index:4;display:flex;gap:10px;align-items:flex-start;transition:transform .2s ease,opacity .2s ease}
.hudBox{border-radius:16px;padding:10px 12px}
#mainHud{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.chip{min-width:96px;padding:8px 11px;border-radius:14px;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 0 12px rgba(130,225,255,.04)}
.chip[data-hot="1"]{border-color:rgba(255,210,110,.36);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 24px rgba(255,206,90,.18)}
.chip[data-combo-tier="1"] .comboCore{color:#ffe37e;text-shadow:0 0 18px rgba(255,224,120,.28)}
.chip[data-combo-tier="2"] .comboCore{color:#ffba65;text-shadow:0 0 22px rgba(255,170,100,.34)}
.chip[data-combo-tier="3"] .comboCore{color:#ff7c7c;text-shadow:0 0 26px rgba(255,110,110,.42)}
.chip[data-low="1"]{border-color:rgba(255,120,140,.24)}
.k{font-size:11px;color:var(--muted);margin-bottom:3px}.v{font-size:16px;font-weight:800;letter-spacing:.03em;text-shadow:0 0 14px rgba(143,247,255,.12)}
.lifeRack{display:inline-flex;gap:2px;vertical-align:middle;margin-right:7px}.lifeGem{font-size:13px;color:#9fe7ff;text-shadow:0 0 10px rgba(155,235,255,.18)}.lifeGem.isLead{color:#d8fbff}.lifeGem.isGhost{opacity:.45}.lifeCount{font-size:15px;color:#eefaff;vertical-align:middle}.comboCore{display:inline-block;color:#d6ecff}.comboCore.isHot{color:#ffe37e;text-shadow:0 0 16px rgba(255,224,120,.22)}

#hud.is-collapsed #mainHud{display:none}
#hud.is-collapsed{opacity:.96}
#hud.is-collapsed #actionHud{width:auto;grid-template-columns:auto}
#hud.is-collapsed #actionHud > :not(#hudBtn){display:none}
#hud.is-collapsed #hudBtn{min-width:96px}

#actionHud{display:grid;grid-template-columns:repeat(4, minmax(88px,1fr));gap:8px;width:min(700px,50vw);transition:all .2s ease}
button,select{border:none;border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.06);color:#fff;font-size:13px;cursor:pointer}
select, option{background:#0b1830;color:#ffffff;}
button:hover,select:hover{box-shadow:0 0 18px rgba(113,236,255,.18)}
#recBtn[data-active="1"]{background:rgba(255,80,80,.18);box-shadow:0 0 18px rgba(255,80,80,.18)}
#shareBtn[data-ready="1"]{background:rgba(120,220,140,.16);box-shadow:0 0 18px rgba(120,220,140,.16)}
#miniTip{position:fixed;left:14px;bottom:14px;z-index:2;border-radius:12px;padding:7px 11px;font-size:11px;color:#d8ecf8;background:rgba(5,18,36,.62);opacity:.84;pointer-events:none;max-width:42vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#menu,#records,#stageSelect,#logs,#overlay{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center}
.hidden{display:none!important}
#menuContent,#recordsContent,#stageSelectContent,#logsContent{width:min(960px,92vw);max-height:88vh;overflow:auto;border-radius:24px;padding:28px;background:rgba(4,13,26,.82);backdrop-filter:blur(14px)}
#menuContent{background:linear-gradient(180deg, rgba(3,12,24,.84), rgba(17,5,28,.86))}
.title{font-size:clamp(32px,4vw,56px);font-weight:900;margin-bottom:6px}.sub{color:#c0d6e4;max-width:760px;line-height:1.6;margin-bottom:18px}
.menuBtns,.recordBtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.heroGrid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:18px}
.card{border-radius:18px;padding:18px;border:1px solid var(--line);background:rgba(7,17,31,.58)}
.stageGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.stageCard{position:relative;min-height:150px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.12);cursor:pointer;background:linear-gradient(135deg,#0d2036,#1a0f32)}
.stageCard .info{position:absolute;inset:0;padding:16px;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.5))}
.recordGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.recordCell{padding:14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
#overlayText{font-size:clamp(30px,5vw,72px);font-weight:900;letter-spacing:.04em;text-shadow:0 0 26px rgba(255,255,255,.2),0 0 40px rgba(113,236,255,.24)}
@media (max-width:1200px){#actionHud{width:auto;grid-template-columns:repeat(4,1fr)} #hud{flex-direction:column}}
</style></head>
<body>
<div id="bg"></div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div id="mainHud" class="panel hudBox">
    <div class="chip"><div class="k" id="labelScore">Score</div><div class="v" id="scoreVal">0</div></div>
    <div class="chip" id="chipLives"><div class="k" id="labelLives">Lives</div><div class="v" id="livesVal">5</div></div>
    <div class="chip"><div class="k" id="labelStage">Stage</div><div class="v" id="stageVal">1</div></div>
    <div class="chip" id="chipCombo"><div class="k" id="labelCombo">Combo</div><div class="v" id="comboVal">0</div></div>
    <div class="chip"><div class="k" id="labelBest">Best</div><div class="v" id="bestVal">0</div></div>
  </div>
  <div id="actionHud" class="panel hudBox">
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="menuBtn">Menu</button>
    <button id="hudBtn">HUD</button>
    <button id="recordsBtn">Records</button>
    <select id="difficultySelect">
      <option value="supereasy">Super Easy</option>
      <option value="easy">Easy</option>
      <option value="normal" selected>Normal</option>
      <option value="hard">Hard</option>
      <option value="hell">HELL</option>
    </select>
    <button id="langBtn">日本語 / English</button>
    <button id="soundBtn">Sound/BGM: ON</button>
    <button id="logsBtn">Logs</button>
    <button id="recBtn">Record</button>
    <button id="shareBtn">Share</button>
    <button id="replayBtn">Replay Link</button>
    <select id="modeSelect">
      <option value="standard" selected>Standard</option>
      <option value="sprint3">Sprint 3:00</option>
    </select>
  </div>
</div>
<div id="miniTip" class="panel">Move: Mouse / ← → | Launch: Space / Click | Pause: P | Logs: Shift + L | Record: REC</div>
<div id="overlay" class="hidden"><div id="overlayText"></div></div>

<div id="menu" style="pointer-events:none">
  <div id="menuContent" class="panel" style="pointer-events:auto">
    <div class="title" id="menuTitle">Cosmic Breaker EX</div>
    <div class="sub" id="menuSub">Stable rebuild with stage select, records, logs, and multiple difficulties.</div>
    <div class="menuBtns">
      <button id="menuStart">Start Run</button>
      <button id="menuStageSelect">Stage Select</button>
      <button id="menuRecords">Records</button>
      <button id="menuLogs">Logs</button>
    </div>
    <div class="heroGrid">
      <div class="card">
        <div style="font-size:20px;font-weight:800;margin-bottom:10px" id="controlTitle">Controls</div>
        <div id="controlBody" style="line-height:1.7;color:#d7e7f0"></div>
      </div>
    </div>
  </div>
</div>

<div id="records" class="hidden">
  <div id="recordsContent" class="panel">
    <div class="title" id="recordsTitle">Records</div>
    <div class="recordGrid" id="recordsGrid"></div>
    <div class="recordBtns">
      <button id="recordsClose">Close</button>
      <button id="recordsReset">Reset Records</button>
    </div>
  </div>
</div>

<div id="stageSelect" class="hidden">
  <div id="stageSelectContent" class="panel">
    <div class="title" id="stageTitle">Stage Select</div>
    <div class="stageGrid" id="stageGrid"></div>
    <div class="recordBtns"><button id="stageClose">Close</button></div>
  </div>
</div>

<div id="logs" class="hidden">
  <div id="logsContent" class="panel">
    <div class="title" id="logsTitle">Logs</div>
    <div style="margin-bottom:10px;color:#cfe3ef;line-height:1.6">Shift + L でログ画面を開きます。Export Logs で JSON 保存。</div>
    <div id="logsGrid" style="display:grid;gap:8px;max-height:50vh;overflow:auto"></div>
    <div class="recordBtns">
      <button id="logsClose">Close</button>
      <button id="logsExport">Export Logs</button>
      <button id="logsClear">Clear Logs</button>
    </div>
  </div>
</div>
<script type="module" src="dist/main.js"></script>
</body></html>
